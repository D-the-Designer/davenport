<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dockyard</title>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
      html,body,#root{height:100%;width:100%;overflow:hidden;}
      body{background:#080C09;font-family:'Berkeley Mono','SF Mono','Fira Code','Courier New',monospace;}
      ::-webkit-scrollbar{width:4px;height:4px;}
      ::-webkit-scrollbar-track{background:#080C09;}
      ::-webkit-scrollbar-thumb{background:#1A4A22;}
      ::-webkit-scrollbar-thumb:hover{background:#2A8C42;}
      input,textarea,select,button{font-family:inherit;}
      ::selection{background:#2A8C42;color:#4AFC6A;}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
