<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#080C09"/>
  <rect x="20" y="20" width="472" height="472" fill="none" stroke="#2A8C42" stroke-width="8"/>
  <!-- Hexagon mark -->
  <polygon points="256,80 340,130 340,230 256,280 172,230 172,130" fill="none" stroke="#4AFC6A" stroke-width="12"/>
  <!-- Inner cross -->
  <line x1="256" y1="80" x2="256" y2="280" stroke="#2A8C42" stroke-width="4"/>
  <line x1="172" y1="130" x2="340" y2="230" stroke="#2A8C42" stroke-width="4"/>
  <line x1="340" y1="130" x2="172" y2="230" stroke="#2A8C42" stroke-width="4"/>
  <!-- Label -->
  <text x="256" y="370" font-family="monospace" font-size="48" font-weight="700" fill="#4AFC6A" text-anchor="middle">DOCK</text>
  <text x="256" y="420" font-family="monospace" font-size="28" fill="#2A8C42" text-anchor="middle" letter-spacing="8">YARD</text>
  <!-- Scan lines -->
  <rect x="20" y="20" width="472" height="472" fill="url(#scan)" opacity="0.15"/>
  <defs>
    <pattern id="scan" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="2" fill="#000"/>
    </pattern>
  </defs>
</svg>
